<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜字解底联机版</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/socket.io.min.js"></script>
</head>
<body>
    <div id="background"></div>
    <div class="glass-container" id="app">
        <header>
            <h1>猜字解底</h1>
        </header>
        <div id="app-message" class="app-message"></div>

        <!-- 登录视图 -->
        <div id="login-view" class="view active">
            <div class="input-group">
                <input type="text" id="player-name" placeholder="请输入你的昵称" maxlength="10">
            </div>
            <button id="btn-enter" class="btn-primary">进入游戏</button>
        </div>

        <!-- 大厅视图 -->
        <div id="lobby-view" class="view">
            <h2>大厅</h2>
            <div class="actions">
                <button id="btn-create-room" class="btn-primary">创建房间</button>
                <div class="divider">或</div>
                <div class="input-group">
                    <input type="text" id="room-code-input" placeholder="输入成语房间名">
                    <button id="btn-join-room" class="btn-secondary">加入房间</button>
                </div>
            </div>
        </div>

        <!-- 房间/游戏视图 -->
        <div id="game-view" class="view">
            <div class="room-header">
                <div style="display: flex; align-items: center; flex-wrap: wrap;">
                    <h3>房间号: <span id="display-room-code"></span></h3>
                    <button id="btn-copy-code" class="btn-icon">复制</button>
                </div>
                <div id="ready-status" style="display:none; color: var(--primary-gold); margin: 0 10px;">准备: <span id="ready-count">0</span>/<span id="total-count">0</span></div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span id="display-state-badge" class="badge">等待中</span>
                    <button id="btn-exit-room" class="btn-icon" style="color: var(--seal-red); border-color: var(--seal-red);">退出</button>
                </div>
            </div>

            <!-- 获胜横幅 -->
            <div id="winner-banner" class="winner-banner" style="display:none;"></div>

            <!-- 玩家列表横幅 -->
            <div id="players-list" class="players-list"></div>

            <!-- 等待开始阶段 -->
            <div id="phase-lobby" class="phase-panel">
                <p>等待其他玩家加入...</p>
                <div style="margin-top: 15px; display: flex; gap: 10px; flex-direction: column;">
                    <button id="btn-toggle-ready" class="btn-secondary" style="display:none;">准备</button>
                    <button id="btn-start-game" class="btn-primary" style="display:none;">开始游戏</button>
                </div>
            </div>

            <!-- 提示阶段 -->
            <div id="phase-hint" class="phase-panel" style="display:none;">
                <div id="hint-player-content">
                    <p style="margin-bottom: 10px;">您的隐藏字是：</p>
                    <div class="mi-zi-ge-container">
                        <div class="mi-zi-ge-wrapper">
                            <span id="my-hidden-word"></span>
                        </div>
                    </div>
                    <p style="margin-bottom: 10px;">请给出两个提示字（能分别与隐藏字组词）：</p>
                    <div class="mi-zi-ge-container">
                        <div class="mi-zi-ge-wrapper">
                            <input type="text" id="hint1-input" maxlength="1" autocomplete="off">
                        </div>
                        <div class="mi-zi-ge-wrapper">
                            <input type="text" id="hint2-input" maxlength="1" autocomplete="off">
                        </div>
                    </div>
                    <button id="btn-submit-hints" class="btn-primary">提交提示</button>
                    <p id="hint-wait-msg" style="display:none; margin-top: 10px;">已提交，等待他人...</p>
                </div>
                <p id="hint-spectator-msg" style="display:none; font-size: 1.2rem; color: var(--text-light);">正在等待玩家出题中…</p>
                <div class="wait-actions" id="hint-actions" style="display:none;">
                    <button class="btn-secondary btn-urge">催促</button>
                    <button class="btn-secondary btn-throw">投掷番茄</button>
                </div>
            </div>

            <!-- 猜测阶段 -->
            <div id="phase-guess" class="phase-panel" style="display:none;">
                <p>请根据他人的提示，猜测他们的隐藏字及本局中心字：</p>
                <div id="guesses-container"></div>
                <div class="center-guess-container">
                    <h4 style="margin-bottom: 15px;">本局中心字猜测</h4>
                    <div class="mi-zi-ge-container">
                        <div class="mi-zi-ge-wrapper">
                            <input type="text" id="center-guess-input" maxlength="1" autocomplete="off">
                        </div>
                    </div>
                </div>
                <button id="btn-submit-guesses" class="btn-primary">提交猜测</button>
                <p id="guess-wait-msg" style="display:none;">已提交，等待他人...</p>
                <div class="wait-actions" id="guess-actions" style="display:none;">
                    <button class="btn-secondary btn-urge">催促</button>
                    <button class="btn-secondary btn-throw">投掷番茄</button>
                </div>
            </div>

            <!-- 结算阶段 -->
            <div id="phase-result" class="phase-panel" style="display:none;">
                <h2>回合结算</h2>
                <div class="center-word-display">
                    <p style="margin-bottom: 15px;">本局中心字</p>
                    <div class="mi-zi-ge-container">
                        <div class="mi-zi-ge-wrapper" style="--grid-color: var(--seal-red); width: 100px; height: 100px;">
                            <span id="result-center-word" style="font-size: 3.5rem; line-height: 100px;"></span>
                        </div>
                    </div>
                </div>
                <div id="result-container" class="result-list"></div>
                <button id="btn-restart-game" class="btn-primary" style="display:none;">再来一局</button>
            </div>

        </div>
    </div>

    <div id="throw-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h4 style="margin-bottom: 12px;">选择投掷目标</h4>
            <div id="throw-targets" style="display:flex; flex-direction:column; gap:0.5rem; margin-bottom: 1rem;"></div>
            <button class="btn-secondary" id="btn-throw-cancel">取消</button>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
